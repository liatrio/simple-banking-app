plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.13'
    id 'java'
}

repositories {
    mavenCentral()
}

javafx {
    version = "17.0.8"  // Using a more stable version
    modules = ['javafx.controls', 'javafx.fxml', 'javafx.web', 'javafx.swing']
}

application {
    // Support for alternate main classes using -PmainClass=some.package.ClassName
    mainClass = project.hasProperty('mainClass') ? project.getProperty('mainClass') : 'com.smartbank.SmartBankApp'
    
    // Add native access for JavaFX and SQLite
    applicationDefaultJvmArgs = [
        '--enable-native-access=javafx.graphics',
        '--enable-native-access=ALL-UNNAMED'
    ]
}

sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
        resources {
            srcDirs = ['src', 'src/main/resources']
        }
    }
}

// Configure Gradle to handle duplicate resources if encountered
tasks.withType(Copy).configureEach {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

dependencies {
    implementation 'org.xerial:sqlite-jdbc:3.45.1.0'
    
    // JPA / Hibernate dependencies
    implementation 'org.hibernate:hibernate-core:5.6.15.Final'
    implementation 'org.hibernate:hibernate-entitymanager:5.6.15.Final'
    
    // Use javax.persistence API (Java EE) instead of Jakarta API to match Hibernate 5.6.x
    implementation 'javax.persistence:javax.persistence-api:2.2'
    
    // SQLite dialect for Hibernate
    implementation 'com.github.gwenn:sqlite-dialect:0.1.0'
    
    // BCrypt for secure password hashing
    implementation 'org.mindrot:jbcrypt:0.4'
    
    // SLF4J implementation
    implementation 'org.slf4j:slf4j-api:1.7.36'
    implementation 'org.slf4j:slf4j-simple:1.7.36'
    
    // PDF Generation
    implementation 'org.apache.pdfbox:pdfbox:2.0.28'
    implementation 'org.apache.pdfbox:fontbox:2.0.28'
    
    // JavaMail for email delivery
    implementation 'com.sun.mail:javax.mail:1.6.2'
    
    // Chart export libraries
    implementation 'org.apache.xmlgraphics:batik-svggen:1.16'
    implementation 'org.apache.xmlgraphics:batik-dom:1.16'
    implementation 'org.apache.xmlgraphics:batik-util:1.16'
    
    // FXSVGChart for SVG export
    implementation 'org.gillius:jfxutils:1.0'
}

sourceCompatibility = 11
targetCompatibility = 11
