plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.13'
    id 'java'
    id 'jacoco'  // JaCoCo plugin for code coverage
}

repositories {
    mavenCentral()
}

javafx {
    version = "17.0.8"  // Using a more stable version
    modules = ['javafx.controls', 'javafx.fxml', 'javafx.web', 'javafx.swing']
}

application {
    // Support for alternate main classes using -PmainClass=some.package.ClassName
    mainClass = project.hasProperty('mainClass') ? project.getProperty('mainClass') : 'com.smartbank.SmartBankApp'
    
    // Add native access for JavaFX and SQLite
    applicationDefaultJvmArgs = [
        '--enable-native-access=javafx.graphics',
        '--enable-native-access=ALL-UNNAMED'
    ]
}

sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
        resources {
            srcDirs = ['src', 'src/main/resources']
        }
    }
    test {
        java {
            srcDirs = ['test']
        }
        resources {
            srcDirs = ['test/resources']
        }
    }
}

// Configure Gradle to handle duplicate resources if encountered
tasks.withType(Copy).configureEach {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

dependencies {
    implementation 'org.xerial:sqlite-jdbc:3.45.1.0'
    
    // JPA / Hibernate dependencies
    implementation 'org.hibernate:hibernate-core:5.6.15.Final'
    implementation 'org.hibernate:hibernate-entitymanager:5.6.15.Final'
    
    // Use javax.persistence API (Java EE) instead of Jakarta API to match Hibernate 5.6.x
    implementation 'javax.persistence:javax.persistence-api:2.2'
    
    // SQLite dialect for Hibernate
    implementation 'com.github.gwenn:sqlite-dialect:0.1.0'
    
    // BCrypt for secure password hashing
    implementation 'org.mindrot:jbcrypt:0.4'
    
    // SLF4J implementation
    implementation 'org.slf4j:slf4j-api:1.7.36'
    implementation 'org.slf4j:slf4j-simple:1.7.36'
    
    // PDF Generation
    implementation 'org.apache.pdfbox:pdfbox:2.0.28'
    implementation 'org.apache.pdfbox:fontbox:2.0.28'
    
    // JavaMail for email delivery
    implementation 'com.sun.mail:javax.mail:1.6.2'
    
    // Chart export libraries
    implementation 'org.apache.xmlgraphics:batik-svggen:1.16'
    implementation 'org.apache.xmlgraphics:batik-dom:1.16'
    implementation 'org.apache.xmlgraphics:batik-util:1.16'
    
    // FXSVGChart for SVG export
    implementation 'org.gillius:jfxutils:1.0'
    
    // Testing dependencies
    // JUnit 5 (Jupiter)
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.9.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.9.2' // For parameterized tests
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.9.2'
    
    // Mockito for mocking
    testImplementation 'org.mockito:mockito-core:5.3.1'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.3.1' // Mockito integration with JUnit 5
    
    // For testing JavaFX components
    testImplementation 'org.testfx:testfx-core:4.0.16-alpha'
    testImplementation 'org.testfx:testfx-junit5:4.0.16-alpha'
    
    // AssertJ for fluent assertions
    testImplementation 'org.assertj:assertj-core:3.24.2'
    
    // H2 in-memory database for testing
    testImplementation 'com.h2database:h2:2.1.214'
}

sourceCompatibility = 11
targetCompatibility = 11

// Configure test task
test {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed"
        exceptionFormat "full"
    }
    reports {
        html.required = true
        junitXml.required = true
    }
}

// Configure JaCoCo for code coverage
jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                '**/view/**',  // Exclude JavaFX view classes from coverage
                '**/SmartBankApp.java',  // Exclude main application class
                '**/Test.java',
                '**/InheritanceTest.java'
            ])
        }))
    }
}

// Configure JaCoCo verification with quality gates
jacocoTestCoverageVerification {
    dependsOn jacocoTestReport
    
    // Only include specific classes that we've tested
    def includedClasses = [
        // Model classes that have tests
        'com.smartbank.model.User',
        'com.smartbank.model.Transaction',
        'com.smartbank.model.TransactionCategory',
        'com.smartbank.model.CheckingAccount',
        'com.smartbank.model.ThemePreference',
        // Utility classes that have tests
        'com.smartbank.util.ValidationUtils',
        'com.smartbank.util.JPAUtil'
        // Controller classes will be added later when we have better coverage
    ]
    
    violationRules {
        rule {
            element = 'CLASS'
            includes = includedClasses
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.70  // 70% line coverage required
            }
        }
        
        rule {
            element = 'CLASS'
            includes = includedClasses
            limit {
                counter = 'BRANCH'
                value = 'COVEREDRATIO'
                minimum = 0.50  // 50% branch coverage required
            }
        }
    }
}

// Make sure jacoco test report and verification are run when check task is run
check.dependsOn jacocoTestReport
check.dependsOn jacocoTestCoverageVerification
